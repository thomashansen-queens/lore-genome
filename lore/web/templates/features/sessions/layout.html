{% extends "layouts/base.html" %}

{% block content %}
<div class="row fill" style="align-items: stretch;">

    <aside class="sidebar">

        {# === Session title and name updater === #}
        <span class="ui-label">Session</span>
        {{ ui.editable_header(session.name, "/sessions/" ~ session.id ~ "/update") }}
        
        <hr />
        
        <label class="strong">Tasks</label>

        <a href="/sessions/{{ session.id }}/tasks/new" class="btn primary fullwidth center">
            🛠 New Task
        </a>

        <hr />

        <label class="strong">Artifacts</label>

        <a href="/sessions/{{ session.id }}/artifacts/" class="btn primary fullwidth center">
            🠩 Manage Artifacts
        </a>

    </aside>
    
    {% block workspace %}{% endblock %}

</div>
{% endblock %}
