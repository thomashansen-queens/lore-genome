{% import 'components/_graph_macros.html' as graph_ui %}

{% set arrow_width = 5 %}
{% set arrow_height = 5 %}
{% set marker_id = "arrowhead_" + layout_dir.lower() %}

<style>
    .node-task {
        fill: white;
        stroke: var(--border);
        stroke-width: 1px;
        filter: drop-shadow(0 1px 2px rgb(0 0 0 / 0.1));
        transition: fill 0.2s ease, stroke 0.2s ease;
    }
    .node-input {
        fill: var(--info-bg);
        stroke: none;
        filter: drop-shadow(0 1px 2px rgb(0 0 0 / 0.1));
    }
    .node-condition {
        fill: var(--warning-bg);
        stroke: var(--warning-border);
        stroke-width: 2px;
    }
    
    /* Dynamic Status Colors! Fallback to primary if CSS vars are missing */
    rect[data-status="template"] { stroke: var(--border, #ccc); }
    rect[data-status="draft"] { stroke: var(--danger-border, red); stroke-dasharray: 4; }
    rect[data-status="queued"] { stroke: var(--info-border, blue); }
    rect[data-status="ready"] { stroke: var(--info-border, blue); }
    rect[data-status="running"] { stroke: var(--warning-border, orange); stroke-width: 2px; }
    rect[data-status="completed"] { stroke: var(--success-border, green); stroke-width: 2px; }
    rect[data-status="failed"] { stroke: var(--danger-border, red); stroke-width: 2px; }
</style>

<svg width="{{ d.canvas_width }}" height="{{ d.canvas_height }}"
    style="display: block; min-width: {{ d.canvas_width }}px; min-height: {{ d.canvas_height }}px;"
    xmlns="http://www.w3.org/2000/svg">

    {# 1. Definitions (Arrowheads) #}
    <defs>
        <marker id="{{ marker_id }}"
                markerWidth="{{ arrow_width }}"
                markerHeight="{{ arrow_height }}"
                refX="{{ arrow_width / 2 }}" refY="{{ arrow_height / 2 }}"
                orient="auto">
            <polygon points="0 0, {{ arrow_width }} {{ arrow_height / 2 }}, 0 {{ arrow_height }}"
                        fill="var(--primary)"/>
        </marker>
    </defs>

    {# 2. Draw Edges #}
    {% for edge in d.edges %}
        {# Only draw the arrowhead if it's pointing to a REAL node, not a dummy routing node #}
        {% set is_to_dummy = edge.target_id.startswith('dummy_') %}
        <path id="edge-{{ marker_id }}-{{ loop.index }}"
            d="{{ edge.path_d }}" 
            fill="none" 
            stroke="var(--primary)" 
            stroke-width="2.5" 
            {% if not is_to_dummy %}marker-end="url(#{{ marker_id }})"{% endif %}/>
        
        {# Draw pinned artifact IDs along the path #}
        {% if edge.label %}
            <text font-family="sans-serif" font-size="11" fill="white" dy="-5">
                <textPath href="#edge-{{ marker_id }}-{{ loop.index }}" startOffset="10%">
                    {{ edge.label }}
                </textPath>
            </text>
        {% endif %}

    {% endfor %}

    {# 3. Draw Nodes #}
    {% for node in d.nodes.values() %}
        
        {# A. Skip Invisible Dummy Nodes #}
        {% if node.node_type == "dummy" %}
            {# pass #}
            
        {# B. All other nodes #}
        {% else %}
            {{ graph_ui.render_graph_node(node, base_url, layout_dir, is_oob=False, workflow=workflow) }}
        {% endif %}
    {% endfor %}

</svg>
